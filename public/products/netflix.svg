<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#2b0a0a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Film reel - geometric pixel style -->
  <g fill="#e50914">
    <!-- Outer ring -->
    <circle cx="100" cy="95" r="55" fill="none" stroke="#e50914" stroke-width="5"/>
    <!-- Inner circle -->
    <circle cx="100" cy="95" r="20" fill="#e50914" opacity="0.3"/>
    <circle cx="100" cy="95" r="10" fill="#e50914" opacity="0.5"/>
    <!-- Sprocket holes - top -->
    <rect x="95" y="38" width="10" height="10" rx="2" fill="#1a0505"/>
    <!-- Sprocket holes - right -->
    <rect x="147" y="90" width="10" height="10" rx="2" fill="#1a0505"/>
    <!-- Sprocket holes - bottom -->
    <rect x="95" y="142" width="10" height="10" rx="2" fill="#1a0505"/>
    <!-- Sprocket holes - left -->
    <rect x="43" y="90" width="10" height="10" rx="2" fill="#1a0505"/>
    <!-- Diagonal sprockets -->
    <rect x="133" y="56" width="10" height="10" rx="2" fill="#1a0505" transform="rotate(0)"/>
    <rect x="133" y="124" width="10" height="10" rx="2" fill="#1a0505"/>
    <rect x="57" y="56" width="10" height="10" rx="2" fill="#1a0505"/>
    <rect x="57" y="124" width="10" height="10" rx="2" fill="#1a0505"/>
    <!-- Film strip trailing -->
    <rect x="55" y="150" width="6" height="25" rx="1" fill="#e50914" opacity="0.4"/>
    <rect x="63" y="150" width="6" height="30" rx="1" fill="#e50914" opacity="0.3"/>
    <rect x="71" y="150" width="6" height="20" rx="1" fill="#e50914" opacity="0.2"/>
  </g>
</svg>