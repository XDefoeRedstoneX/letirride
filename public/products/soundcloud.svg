<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="100%" stop-color="#2b1a0a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Sound wave - geometric bars -->
  <g fill="#ff5500">
    <!-- Center tallest bars -->
    <rect x="90" y="55" width="8" height="90" rx="2"/>
    <rect x="102" y="55" width="8" height="90" rx="2"/>
    <!-- Near center -->
    <rect x="78" y="65" width="8" height="70" rx="2"/>
    <rect x="114" y="65" width="8" height="70" rx="2"/>
    <!-- Medium -->
    <rect x="66" y="75" width="8" height="50" rx="2"/>
    <rect x="126" y="75" width="8" height="50" rx="2"/>
    <!-- Shorter -->
    <rect x="54" y="85" width="8" height="30" rx="2" opacity="0.8"/>
    <rect x="138" y="85" width="8" height="30" rx="2" opacity="0.8"/>
    <!-- Shortest -->
    <rect x="42" y="90" width="8" height="20" rx="2" opacity="0.5"/>
    <rect x="150" y="90" width="8" height="20" rx="2" opacity="0.5"/>
  </g>
  <!-- Cloud shape at bottom -->
  <g fill="#ff5500" opacity="0.5">
    <rect x="60" y="150" width="80" height="18" rx="9"/>
    <rect x="45" y="140" width="12" height="14" rx="4"/>
    <rect x="60" y="136" width="12" height="18" rx="4"/>
    <rect x="76" y="133" width="12" height="21" rx="4"/>
    <rect x="92" y="130" width="12" height="24" rx="4"/>
    <rect x="108" y="133" width="12" height="21" rx="4"/>
    <rect x="124" y="136" width="12" height="18" rx="4"/>
    <rect x="139" y="140" width="12" height="14" rx="4"/>
  </g>
</svg>