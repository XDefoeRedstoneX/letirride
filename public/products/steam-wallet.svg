<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2b3e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Game Controller - pixelated geometric style -->
  <g fill="#1a9ba5">
    <!-- Main body -->
    <rect x="50" y="85" width="100" height="35" rx="4"/>
    <!-- Left grip -->
    <rect x="40" y="105" width="30" height="30" rx="4"/>
    <rect x="35" y="125" width="25" height="15" rx="4"/>
    <!-- Right grip -->
    <rect x="130" y="105" width="30" height="30" rx="4"/>
    <rect x="140" y="125" width="25" height="15" rx="4"/>
    <!-- D-pad left -->
    <rect x="58" y="93" width="14" height="4" rx="1" fill="#0d2b3e"/>
    <rect x="63" y="88" width="4" height="14" rx="1" fill="#0d2b3e"/>
    <!-- Buttons right -->
    <rect x="120" y="90" width="7" height="7" rx="1" fill="#0d2b3e"/>
    <rect x="130" y="90" width="7" height="7" rx="1" fill="#0d2b3e"/>
    <rect x="125" y="83" width="7" height="7" rx="1" fill="#0d2b3e"/>
    <rect x="125" y="97" width="7" height="7" rx="1" fill="#0d2b3e"/>
    <!-- Center buttons -->
    <rect x="90" y="93" width="6" height="6" rx="1" fill="#2dd4bf"/>
    <rect x="102" y="93" width="6" height="6" rx="1" fill="#2dd4bf"/>
  </g>
  <!-- Glow accents -->
  <rect x="50" y="155" width="100" height="2" rx="1" fill="#1a9ba5" opacity="0.3"/>
  <rect x="60" y="160" width="80" height="1" rx="0.5" fill="#1a9ba5" opacity="0.15"/>
</svg>