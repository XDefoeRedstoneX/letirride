<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Notion-style document icon - black/white geometric -->
  <g>
    <!-- Document outline -->
    <rect x="50" y="35" width="100" height="130" rx="6" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="50" y="35" width="100" height="130" rx="6" fill="#ffffff" opacity="0.05"/>
    <!-- Title bar -->
    <rect x="50" y="35" width="100" height="28" rx="6" fill="#ffffff" opacity="0.12"/>
    <rect x="56" y="35" width="88" height="4" fill="#1a1a1a"/>
    <!-- Text lines - pixel block style -->
    <rect x="65" y="78" width="55" height="5" rx="1" fill="#ffffff" opacity="0.8"/>
    <rect x="65" y="90" width="70" height="5" rx="1" fill="#ffffff" opacity="0.6"/>
    <rect x="65" y="102" width="45" height="5" rx="1" fill="#ffffff" opacity="0.5"/>
    <rect x="65" y="114" width="60" height="5" rx="1" fill="#ffffff" opacity="0.4"/>
    <rect x="65" y="126" width="35" height="5" rx="1" fill="#ffffff" opacity="0.3"/>
    <!-- Checkbox icon -->
    <rect x="65" y="142" width="12" height="12" rx="2" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <rect x="84" y="146" width="40" height="4" rx="1" fill="#ffffff" opacity="0.25"/>
    <!-- Page fold -->
    <polygon points="140,35 150,35 150,45" fill="#ffffff" opacity="0.15"/>
  </g>
</svg>