<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2a"/>
      <stop offset="100%" stop-color="#2b0d3e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- TV/Screen - geometric pixel style -->
  <g fill="#9b59b6">
    <!-- Screen body -->
    <rect x="35" y="45" width="130" height="90" rx="6" fill="none" stroke="#9b59b6" stroke-width="4"/>
    <!-- Screen inner -->
    <rect x="45" y="55" width="110" height="65" rx="3" fill="#9b59b6" opacity="0.15"/>
    <!-- Screen content - play indicator -->
    <polygon points="85,70 85,100 110,85" fill="#9b59b6" opacity="0.7"/>
    <!-- Stand -->
    <rect x="85" y="135" width="30" height="6" rx="1" fill="#9b59b6"/>
    <!-- Stand base -->
    <rect x="70" y="141" width="60" height="5" rx="2" fill="#9b59b6"/>
    <!-- Antenna left -->
    <rect x="72" y="30" width="3" height="18" rx="1" fill="#9b59b6" opacity="0.6"/>
    <!-- Antenna right -->
    <rect x="125" y="30" width="3" height="18" rx="1" fill="#9b59b6" opacity="0.6"/>
    <!-- Antenna tips -->
    <rect x="68" y="26" width="11" height="6" rx="2" fill="#9b59b6" opacity="0.8"/>
    <rect x="121" y="26" width="11" height="6" rx="2" fill="#9b59b6" opacity="0.8"/>
  </g>
  <!-- Bottom accent -->
  <rect x="50" y="160" width="100" height="2" rx="1" fill="#9b59b6" opacity="0.3"/>
</svg>