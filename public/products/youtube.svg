<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#2b0d0d"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Rounded rectangle (YouTube-style) -->
  <rect x="30" y="55" width="140" height="90" rx="18" fill="#ff0000" opacity="0.15"/>
  <rect x="35" y="60" width="130" height="80" rx="15" fill="none" stroke="#ff0000" stroke-width="4"/>
  <!-- Play triangle - geometric/pixelated -->
  <polygon points="85,80 85,120 120,100" fill="#ff0000"/>
  <!-- Pixel accents -->
  <rect x="55" y="148" width="8" height="8" rx="1" fill="#ff0000" opacity="0.4"/>
  <rect x="67" y="148" width="8" height="8" rx="1" fill="#ff0000" opacity="0.3"/>
  <rect x="79" y="148" width="8" height="8" rx="1" fill="#ff0000" opacity="0.2"/>
  <rect x="91" y="148" width="8" height="8" rx="1" fill="#ff0000" opacity="0.15"/>
  <rect x="103" y="148" width="8" height="8" rx="1" fill="#ff0000" opacity="0.1"/>
</svg>