<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#0d2b10"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Xbox-style icon - X in circle -->
  <g fill="#107c10">
    <!-- Outer circle -->
    <circle cx="100" cy="100" r="60" fill="none" stroke="#107c10" stroke-width="5"/>
    <circle cx="100" cy="100" r="52" fill="#107c10" opacity="0.08"/>
    <!-- X shape made of pixel blocks -->
    <!-- Top-left to bottom-right diagonal -->
    <rect x="65" y="60" width="12" height="12" rx="2"/>
    <rect x="78" y="73" width="12" height="12" rx="2"/>
    <rect x="91" y="86" width="12" height="12" rx="2"/>
    <rect x="100" y="95" width="12" height="12" rx="2" opacity="0.8"/>
    <rect x="113" y="108" width="12" height="12" rx="2"/>
    <rect x="126" y="121" width="12" height="12" rx="2"/>
    <!-- Top-right to bottom-left diagonal -->
    <rect x="126" y="60" width="12" height="12" rx="2"/>
    <rect x="113" y="73" width="12" height="12" rx="2"/>
    <rect x="100" y="86" width="12" height="12" rx="2" opacity="0.8"/>
    <rect x="91" y="95" width="12" height="12" rx="2"/>
    <rect x="78" y="108" width="12" height="12" rx="2"/>
    <rect x="65" y="121" width="12" height="12" rx="2"/>
    <!-- Glow center -->
    <circle cx="100" cy="100" r="5" fill="#2ecc40" opacity="0.6"/>
  </g>
  <!-- Bottom accent -->
  <rect x="50" y="170" width="100" height="2" rx="1" fill="#107c10" opacity="0.3"/>
</svg>