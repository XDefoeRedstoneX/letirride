<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c2c3a"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Pixel art face/avatar - neutral colors -->
  <g>
    <!-- Head outline -->
    <rect x="65" y="35" width="70" height="10" rx="1" fill="#c8b89a"/>
    <rect x="55" y="45" width="90" height="10" rx="1" fill="#c8b89a"/>
    <rect x="50" y="55" width="100" height="10" rx="1" fill="#c8b89a"/>
    <rect x="50" y="65" width="10" height="30" rx="1" fill="#c8b89a"/>
    <rect x="140" y="65" width="10" height="30" rx="1" fill="#c8b89a"/>
    <rect x="50" y="95" width="100" height="10" rx="1" fill="#c8b89a"/>
    <!-- Head fill -->
    <rect x="60" y="45" width="80" height="50" rx="1" fill="#dcc8a8"/>
    <!-- Hair -->
    <rect x="60" y="35" width="80" height="20" rx="1" fill="#5a4a3a"/>
    <rect x="50" y="55" width="10" height="15" rx="1" fill="#5a4a3a"/>
    <rect x="140" y="55" width="10" height="15" rx="1" fill="#5a4a3a"/>
    <!-- Eyes -->
    <rect x="72" y="68" width="12" height="10" rx="1" fill="#ffffff"/>
    <rect x="76" y="70" width="6" height="6" rx="1" fill="#3a3a4a"/>
    <rect x="116" y="68" width="12" height="10" rx="1" fill="#ffffff"/>
    <rect x="118" y="70" width="6" height="6" rx="1" fill="#3a3a4a"/>
    <!-- Mouth -->
    <rect x="88" y="86" width="24" height="4" rx="1" fill="#b89a7a"/>
    <!-- Body/shoulders -->
    <rect x="45" y="105" width="110" height="10" rx="1" fill="#6a7a8a"/>
    <rect x="40" y="115" width="120" height="10" rx="1" fill="#6a7a8a"/>
    <rect x="35" y="125" width="130" height="10" rx="1" fill="#6a7a8a"/>
    <rect x="35" y="135" width="130" height="10" rx="1" fill="#5a6a7a"/>
    <rect x="40" y="145" width="120" height="10" rx="1" fill="#5a6a7a"/>
    <rect x="50" y="155" width="100" height="10" rx="1" fill="#4a5a6a"/>
    <!-- Collar detail -->
    <rect x="85" y="105" width="6" height="15" rx="1" fill="#8a9aaa"/>
    <rect x="109" y="105" width="6" height="15" rx="1" fill="#8a9aaa"/>
  </g>
</svg>