<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1505"/>
      <stop offset="100%" stop-color="#2b2208"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Star/Coin icon - gold pixelated -->
  <g fill="url(#gold)">
    <!-- Star shape from pixel blocks -->
    <!-- Top point -->
    <rect x="94" y="35" width="12" height="12" rx="1"/>
    <rect x="88" y="47" width="24" height="12" rx="1"/>
    <!-- Left point -->
    <rect x="55" y="59" width="12" height="12" rx="1"/>
    <rect x="67" y="59" width="12" height="12" rx="1"/>
    <rect x="79" y="59" width="12" height="12" rx="1"/>
    <rect x="79" y="47" width="12" height="12" rx="1"/>
    <!-- Right point -->
    <rect x="109" y="59" width="12" height="12" rx="1"/>
    <rect x="121" y="59" width="12" height="12" rx="1"/>
    <rect x="133" y="59" width="12" height="12" rx="1"/>
    <rect x="109" y="47" width="12" height="12" rx="1"/>
    <!-- Center block -->
    <rect x="79" y="71" width="42" height="24" rx="2"/>
    <!-- Lower left -->
    <rect x="67" y="83" width="12" height="12" rx="1"/>
    <rect x="55" y="95" width="12" height="12" rx="1"/>
    <!-- Lower right -->
    <rect x="121" y="83" width="12" height="12" rx="1"/>
    <rect x="133" y="95" width="12" height="12" rx="1"/>
    <!-- Bottom point -->
    <rect x="88" y="95" width="24" height="12" rx="1"/>
    <rect x="94" y="107" width="12" height="12" rx="1"/>
    <rect x="97" y="119" width="6" height="12" rx="1"/>
  </g>
  <!-- Coin circle overlay -->
  <circle cx="100" cy="95" r="12" fill="#1a1505" opacity="0.3"/>
  <text x="100" y="100" font-size="14" fill="#1a1505" text-anchor="middle" font-weight="bold" opacity="0.5">$</text>
  <!-- Sparkle accents -->
  <rect x="40" y="40" width="4" height="4" rx="1" fill="#ffd700" opacity="0.6"/>
  <rect x="155" y="45" width="4" height="4" rx="1" fill="#ffd700" opacity="0.4"/>
  <rect x="35" y="140" width="4" height="4" rx="1" fill="#ffd700" opacity="0.3"/>
  <rect x="160" y="135" width="4" height="4" rx="1" fill="#ffd700" opacity="0.5"/>
</svg>