<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051520"/>
      <stop offset="100%" stop-color="#0a2a35"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="16" fill="url(#bg)"/>
  <!-- Money/Wallet icon - cyan geometric -->
  <g fill="#00bcd4">
    <!-- Wallet body -->
    <rect x="35" y="55" width="130" height="90" rx="8" fill="none" stroke="#00bcd4" stroke-width="4"/>
    <rect x="35" y="55" width="130" height="90" rx="8" fill="#00bcd4" opacity="0.06"/>
    <!-- Wallet flap -->
    <rect x="35" y="55" width="130" height="30" rx="8" fill="#00bcd4" opacity="0.12"/>
    <rect x="35" y="78" width="130" height="3" fill="#00bcd4" opacity="0.2"/>
    <!-- Clasp -->
    <rect x="130" y="80" width="35" height="25" rx="4" fill="none" stroke="#00bcd4" stroke-width="3"/>
    <circle cx="148" cy="92" r="6" fill="#00bcd4" opacity="0.5"/>
    <!-- Dollar sign - pixel blocks -->
    <rect x="90" y="100" width="8" height="6" rx="1" fill="#00bcd4" opacity="0.7"/>
    <rect x="86" y="106" width="8" height="6" rx="1" fill="#00bcd4" opacity="0.6"/>
    <rect x="90" y="112" width="8" height="6" rx="1" fill="#00bcd4" opacity="0.5"/>
    <rect x="98" y="106" width="8" height="6" rx="1" fill="#00bcd4" opacity="0.6"/>
    <rect x="94" y="96" width="4" height="28" rx="1" fill="#00bcd4" opacity="0.4"/>
    <!-- Coins peeking out -->
    <circle cx="60" cy="95" r="12" fill="none" stroke="#00bcd4" stroke-width="2" opacity="0.3"/>
    <circle cx="75" cy="90" r="12" fill="none" stroke="#00bcd4" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Bottom accent -->
  <rect x="50" y="160" width="100" height="2" rx="1" fill="#00bcd4" opacity="0.3"/>
</svg>